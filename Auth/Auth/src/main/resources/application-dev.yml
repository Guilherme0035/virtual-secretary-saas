server:
  port: 8081

spring:
  datasource:
    url: jdbc:postgresql://localhost:5434/auth_db
    username: auth_user
    password: auth_password

  jpa:
    hibernate:
      ddl-auto: validate

  flyway:
    enabled: true
    locations: classpath:db/migration

logging:
  level:
    root: INFO

app:
  jwt:
    public-key: classpath:keys/public.pem
    private-key: classpath:keys/private.pem